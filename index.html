<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chao Soundboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="background-elements">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
        <div class="glow-orb orb-3"></div>
    </div>

    <main class="container">
        <header>
            <h1 class="title">Botonera <span class="highlight">Pro</span></h1>
            <p class="subtitle">An aesthetic soundboard experience</p>
        </header>

        <nav class="tabs-container">
            <button class="tab-btn active" data-category="chao">
                <span class="tab-icon">✨</span>
                Chao
            </button>
            <button class="tab-btn" data-category="sonic">
                <span class="tab-icon">🦔</span>
                Sonic
            </button>
            <button class="tab-btn" data-category="shadow">
                <span class="tab-icon">🌑</span>
                Shadow
            </button>
            <button class="tab-btn" data-category="pokemon">
                <span class="tab-icon">🐾</span>
                Pokemon
            </button>
        </nav>

        <section class="controls">
            <button id="stop-all-btn" class="control-btn" aria-label="Stop all sounds">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                </svg>
                Stop All
            </button>
            <div class="volume-control">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                    <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                    <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
                </svg>
                <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.75" />
            </div>
            <div class="overlap-toggle">
                <label for="overlap-checkbox">Allow overlap</label>
                <label class="switch">
                    <input type="checkbox" id="overlap-checkbox" checked>
                    <span class="slider round"></span>
                </label>
            </div>
        </section>

        <section id="soundboard-grid" class="grid-container">
            <!-- Buttons will be generated here by script.js -->
            <div class="loading-state">
                <div class="spinner"></div>
                <p>Loading voices...</p>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
